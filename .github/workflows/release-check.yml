name: release-check

on:
  push:
  pull_request:

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python runtime dependency
        run: python -m pip install -r plugins/expool/servers/requirements.txt
      - name: Release preflight
        run: npm run release:check
